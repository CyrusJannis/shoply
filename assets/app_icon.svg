<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern blue gradient matching app accent -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  
  <!-- Clean white background with rounded corners (iOS style) -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#FFFFFF"/>
  
  <!-- Modern S with integrated shopping bag handle -->
  <g transform="translate(512, 512)">
    <!-- Main S curve - clean, modern stroke -->
    <path d="M-140,-260 
             C80,-260 160,-180 160,-80 
             C160,20 -20,60 -80,100
             C-140,140 -160,180 -160,240
             C-160,320 -60,360 140,360"
          fill="none"
          stroke="url(#blueGradient)"
          stroke-width="90"
          stroke-linecap="round"/>
    
    <!-- Subtle shopping bag handle integrated at top -->
    <path d="M-140,-260 
             C-140,-340 -60,-380 20,-380
             C100,-380 140,-340 140,-280"
          fill="none"
          stroke="url(#blueGradient)"
          stroke-width="50"
          stroke-linecap="round"/>
  </g>
</svg>
