name: shoply
description: "A modern shopping list app with shared lists, coupon finder, and recipe suggestions."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Backend & Database
  supabase_flutter: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Network & Images
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2
  http: ^1.2.0
  dio: ^5.4.0
  
  # QR & Barcode
  qr_flutter: ^4.1.0
  # mobile_scanner: ^5.0.06  # Disabled for iOS compatibility
  
  # Notifications
  flutter_local_notifications: ^16.3.2
  firebase_messaging: ^14.0.0
  firebase_core: ^2.0.0
  
  # Utilities
  share_plus: ^7.2.2
  url_launcher: ^6.2.3
  image_picker: ^1.0.7
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Authentication
  local_auth: ^2.1.8
  # google_sign_in: ^6.1.0  # Disabled for iOS compatibility
  sign_in_with_apple: ^5.0.0
  webview_flutter: ^4.4.4
  webview_flutter_wkwebview: ^3.9.4
  
  # PDF & Documents
  flutter_pdfview: ^1.3.2
  
  # Other
  reorderables: ^0.6.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/images/app_icon.PNG"
  image_path: "assets/images/app_icon.PNG"
  remove_alpha_ios: true
